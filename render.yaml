# Render deployment for the FastAPI backend.
#
# What this does:
#   1. pip install . — installs the project from pyproject.toml (hatchling
#      builds the wheel; pip resolves all dependencies). The src package
#      becomes importable, and `support-agent` is on PATH.
#   2. python scripts/init_db.py — runs schema.sql + seed.sql once during
#      the build, so data/tasklet.db ships with the deploy and every cold
#      start has the same 5 users / 100 tickets to play with.
#   3. Starts uvicorn bound to the port Render injects via $PORT.
#
# Free tier notes:
#   * Sleeps after ~15 minutes idle. First request after sleep takes
#     ~30–60s while the container wakes up.
#   * Filesystem is ephemeral. Tickets created during runtime live until
#     the worker restarts (sleep wake or redeploy), then the DB resets to
#     the seeded state. For a teaching demo this is fine, even desirable.
#   * Persistence costs $7/mo (1 GB disk). Easy to add later.
#
# After this service is created on Render, set the secret in the dashboard:
#   Environment → Add Environment Variable → ANTHROPIC_API_KEY = <your key>
# It is intentionally NOT in this file (sync: false).

services:
  # Two important deployment quirks captured here:
  #
  # 1. Editable install (`pip install -e .`). Without -e, the `src` package
  #    is copied into site-packages and `__file__` inside src/db.py resolves
  #    there — making DB_PATH point somewhere init_db never wrote. Local dev
  #    doesn't hit this because uv defaults to editable installs.
  #
  # 2. init_db runs at startCommand, not buildCommand. Render's free tier
  #    does not reliably preserve build-time writes outside of the venv into
  #    the runtime filesystem. Running init_db at startup re-seeds the DB
  #    inside the same filesystem the app actually reads from. Adds ~100ms
  #    to cold starts; trivial.
  - type: web
    name: tasklet-support-agent
    runtime: python
    plan: free
    pythonVersion: "3.11"
    buildCommand: "pip install -e ."
    startCommand: "python scripts/init_db.py && uvicorn src.api:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /api/users
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"

  # Streamlit UI as its own Render service. Independent from the FastAPI
  # service above — each has its own seeded SQLite, so tickets created in
  # one demo don't appear in the other. Fine for a teaching demo.
  #
  # --server.headless true skips Streamlit's first-run "enter your email"
  # prompt that would otherwise hang the start command.
  # --server.enableXsrfProtection false because Render's load balancer
  # injects headers that Streamlit's default XSRF check rejects.
  - type: web
    name: tasklet-streamlit
    runtime: python
    plan: free
    pythonVersion: "3.11"
    buildCommand: "pip install -e ."
    startCommand: "python scripts/init_db.py && streamlit run src/app.py --server.address 0.0.0.0 --server.port $PORT --server.headless true --server.enableXsrfProtection false"
    healthCheckPath: /_stcore/health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
